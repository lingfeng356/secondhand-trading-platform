spring:
  cache:
    type: caffeine
    cache-names:
      - productDetail          # ✅ 商品详情
      - productListBySearch    # ✅ 商品搜索列表
      - categoryProducts       # ✅ 分类商品列表
      - recommendProducts      # ✅ 首页推荐
      - reviewList             # ✅ 评价列表
      - userInfo               # ✅ 用户信息
    caffeine:
      # spec 配置：最大容量1000，最后一次访问后600秒过期
      spec: maximumSize=1000,expireAfterAccess=600s
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    cache:
      channel:
        size: 25 #每个连接缓存25个通道
        checkout-timeout: 6000 #获取通道超时
  servlet:
    multipart:
      max-file-size: 2MB        # 单个文件最大大小
      max-request-size: 10MB    # 总请求最大大小
  datasource:
    url: jdbc:mysql://localhost:3306/second_hand_trading_platform
    username: root
    password: hexu0629
    hikari:
      maximum-pool-size: 10      # 最大连接数（默认10）
      minimum-idle: 5            # 最小空闲连接（默认10）
      connection-timeout: 30000  # 获取连接超时（毫秒，默认30秒）
      idle-timeout: 600000       # 空闲超时（毫秒，10分钟）
      max-lifetime: 1800000      # 连接最大存活时间（30分钟）
      pool-name: SecondHandHikariPool  # 连接池名字，便于监控
      connection-test-query: SELECT 1  # 测试连接是否有效
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      connect-timeout: 5000
      client-type: lettuce
      lettuce:
        pool:
          enabled: true #开启连接池
          max-active: 8 #最大连接数
          min-idle: 0 #最小空闲连接
          max-wait: -1ms #获取连接超时时间 -1ms表示一直等

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true  # 确保是 true（默认就是 true）开启驼峰映射
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

#接口文档工具
knife4j:
  enable: true  # 开启增强功能
  production: false # 生产环境请设为 true 以关闭文档

server:
  port: 8080

# 自定义文件存储配置
upload:
  # 头像存储路径，根据你的系统改成合适的位置，如 Linux 下的 /var/uploads/avatars/
  path: D:\\DevProjects\\static

sa-token:
  token-name: token
  timeout: 2592000
  active-timeout: 1800 #活跃续期，实现无感续期
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false